<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Black background card with neon green border -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="#000000" stroke="#00ff3c" stroke-width="3"/>
  
  <!-- Red glowing warning triangle -->
  <path d="M32 10 L52 46 A 2 2 0 0 1 50 49 L14 49 A 2 2 0 0 1 12 46 Z" fill="#0c0002" stroke="#ff003c" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Exclamation symbol inside triangle -->
  <text x="32" y="40" font-family="'Cairo', 'Segoe UI', Arial, sans-serif" font-size="24" font-weight="900" fill="#ff003c" text-anchor="middle" dominant-baseline="middle">!</text>
</svg>
